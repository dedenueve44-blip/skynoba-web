<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyNova Airlines</title>
<style>
body{
font-family:Arial;
margin:0;
background:#0f2027;
color:white;
text-align:center;
}
.hero{
padding:100px 20px;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
}
input,button{
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}
button{
background:#00c6ff;
color:white;
cursor:pointer;
}
.result{
margin-top:30px;
background:white;
color:black;
padding:20px;
border-radius:10px;
display:inline-block;
}
</style>
</head>
<body>

<div class="hero">
<h1>✈ SkyNova Airlines</h1>
<h2>Reserva tu vuelo ahora</h2>

<input type="text" id="origen" placeholder="Origen">
<input type="text" id="destino" placeholder="Destino">
<input type="date" id="fecha">
<br>
<button onclick="buscarVuelo()">Buscar Vuelo</button>

<div id="resultado"></div>

</div>

<script>
function buscarVuelo(){

let origen = document.getElementById("origen").value;
let destino = document.getElementById("destino").value;
let fecha = document.getElementById("fecha").value;

if(origen === "" || destino === "" || fecha === ""){
document.getElementById("resultado").innerHTML = "<p style='color:red;'>Completa todos los campos</p>";
return;
}

let precio = Math.floor(Math.random() * 500) + 200;

document.getElementById("resultado").innerHTML = `
<div class="result">
<h3>Vuelo Disponible</h3>
<p><strong>Origen:</strong> ${origen}</p>
<p><strong>Destino:</strong> ${destino}</p>
<p><strong>Fecha:</strong> ${fecha}</p>
<p><strong>Precio:</strong> $${precio}</p>
<button onclick="alert('Reserva confirmada ✈')">Reservar</button>
</div>
`;
}
</script>

</body>
</html>
